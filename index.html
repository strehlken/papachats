<style>
:root {
  --bg: #f6f0e6;
  --paper: #fbf7ee;
  --ink: #2a1f1a;
  --muted: #6b5a4f;
  --burgundy: #7a2a2a;
  --gold: #b58a3e;
  --rule: rgba(42,31,26,0.18);
  --shadow: 0 1px 2px rgba(42,31,26,0.06), 0 8px 24px rgba(42,31,26,0.08);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Lora', Georgia, serif;
  font-size: 17px;
  line-height: 1.65;
  min-height: 100vh;
}

main {
  max-width: 720px;
  margin: 0 auto;
  padding: 14vh 6vw 10vh;
}

.kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

h1.title {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: clamp(44px, 8vw, 88px);
  line-height: 0.98;
  letter-spacing: -0.02em;
  margin: 0 0 18px;
  color: var(--burgundy);
}

p.subtitle {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: clamp(17px, 2vw, 22px);
  color: var(--muted);
  margin: 0 0 56px;
  max-width: 560px;
}

.entries {
  list-style: none;
  margin: 0;
  padding: 0;
  border-top: 1px solid var(--rule);
}

.entries li {
  border-bottom: 1px solid var(--rule);
}

.entries a {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  gap: 28px;
  align-items: baseline;
  padding: 22px 4px;
  text-decoration: none;
  color: var(--ink);
  transition: background 160ms ease, padding 160ms ease;
}

.entries a:hover {
  background: var(--paper);
  padding-left: 14px;
  padding-right: 14px;
}

.entries .date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.14em;
  color: var(--gold);
  text-transform: uppercase;
}

.entries .heading {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: clamp(20px, 2.4vw, 26px);
  color: var(--burgundy);
}

.entries .arrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--muted);
  transition: transform 160ms ease, color 160ms ease;
}

.entries a:hover .arrow {
  transform: translateX(4px);
  color: var(--burgundy);
}

@media (max-width: 600px) {
  .entries a {
    grid-template-columns: 1fr auto;
    gap: 6px 16px;
  }
  .entries .date { grid-column: 1 / -1; }
}

footer {
  margin-top: 80px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
</style>
</head>
<body>
<main>
  <div class="kicker">An ongoing record</div>
  <h1 class="title">Papa Chats</h1>
  <p class="subtitle">Days with my father — conversations, walks, small things worth remembering.</p>

  <ul class="entries">
    <li>
      <a href="20260505.html">
        <span class="date">Tue · May 5, 2026</span>
        <span class="heading">A Day with Papa</span>
        <span class="arrow">&rarr;</span>
      </a>
    </li>
  </ul>

  <footer>strehlken.github.io/papachats</footer>
</main>
</body>
